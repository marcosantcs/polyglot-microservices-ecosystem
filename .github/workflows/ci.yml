name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  test-dotnet:
    name: .NET Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore dependencies
        run: dotnet restore order-service-dotnet/OrderService.csproj
      - name: Build
        run: dotnet build order-service-dotnet/OrderService.csproj --no-restore
      - name: Run tests with coverage
        run: |
          dotnet test order-service-dotnet/tests/OrderService.Tests/OrderService.Tests.csproj \
            --no-build --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-coverage
          path: coverage/

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install analytics dependencies
        run: pip install -r analytics-service-python/requirements-test.txt
      - name: Run analytics tests
        run: pytest analytics-service-python/tests/ -v --tb=short
      - name: Install AI service dependencies
        run: pip install -r ai-service-python/requirements.txt pytest httpx
      - name: Run AI service tests
        run: pytest ai-service-python/tests/ -v --tb=short

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-dotnet, test-python]
    steps:
      - uses: actions/checkout@v4
      - name: Build order-service image
        run: docker build -t order-service:ci ./order-service-dotnet
      - name: Build analytics-service image
        run: docker build -t analytics-service:ci ./analytics-service-python
      - name: Build ai-service image
        run: docker build -t ai-service:ci ./ai-service-python
